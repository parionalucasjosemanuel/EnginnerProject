<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Admin Panel | CodePulse Campus</title>
<link
        rel="icon"
        type="image/x-icon"
        href="./assets/icons/logo.ico"
    />

    <link
        rel="stylesheet"
        href="./css/main.css"
    >

</head>

<body>

    <div class="admin-container">

        <header class="admin-header">

            <h1>
                Administrative Dashboard
            </h1>

            <p>
                Manage users, metrics, analytics and challenges.
            </p>

        </header>

        <section class="admin-grid">

            <div class="admin-card">

                <h3>
                    Total Users
                </h3>

                <p id="totalUsers">
                    0
                </p>

            </div>

            <div class="admin-card">

                <h3>
                    Total Sessions
                </h3>

                <p id="totalSessions">
                    0
                </p>

            </div>

            <div class="admin-card">

                <h3>
                    Total Submissions
                </h3>

                <p id="totalSubmissions">
                    0
                </p>

            </div>

            <div class="admin-card">

                <h3>
                    Platform IPL Average
                </h3>

                <p id="platformIPL">
                    0
                </p>

            </div>

        </section>

    </div>

</body>

</html>
