<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <link
        rel="icon"
        type="image/x-icon"
        href="./assets/icons/logo.ico"
    />
<div class="logo-container">

    <img
        src="./assets/logo/login.png"
        alt="CodePulse Campus Logo"
        class="main-logo"
    />

</div>
    <title>Login | ALGORYTHRA Campus</title>

    <link
        rel="stylesheet"
        href="./css/main.css"
    >

    <link
        rel="stylesheet"
        href="./css/auth.css"
    >

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>
                Welcome Back
            </h1>

            <p>
                Continue improving your logical skills.
            </p>

            <form id="loginForm">

                <div class="form-group">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        required
                    >

                </div>

                <div class="form-group">

                    <label>Password</label>

                    <input
                        type="password"
                        id="password"
                        required
                    >

                </div>

                <button
                    type="submit"
                    class="primary-btn full-width"
                >
                    Login
                </button>

            </form>

            <div class="auth-footer">

                <p>
                    Don't have an account?
                </p>

                <a href="register.html">
                    Register
                </a>

            </div>

        </div>

    </div>

    <script src="./js/auth.js"></script>

</body>

</html>
